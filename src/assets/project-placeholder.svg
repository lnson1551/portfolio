<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Project image placeholder</title>
  <desc id="desc">Neutral placeholder used when project images are removed.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e7ebef" />
      <stop offset="100%" stop-color="#d2d9e0" />
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)" />
  <rect x="60" y="60" width="1080" height="680" rx="24" fill="none" stroke="#8a98a8" stroke-width="8" />
  <g fill="none" stroke="#8a98a8" stroke-linecap="round" stroke-width="14">
    <path d="M230 560 L450 360 L590 480 L760 290 L970 560" />
    <circle cx="420" cy="250" r="52" />
  </g>
  <text
    x="600"
    y="665"
    text-anchor="middle"
    fill="#5d6d7e"
    font-family="Inter, Arial, sans-serif"
    font-size="64"
    font-weight="600"
  >
    Project Image Removed
  </text>
</svg>
